model_type: decoder
data_fp: data/tokenized/mimic
val_size: 0.1
out_dir: out/sample_model
eval_interval: 500
log_interval: 10
resume: false
wandb_log: false
wandb_project: ethos
wandb_run_name: sample_run
gradient_accumulation_steps: 8
batch_size: 4
max_iters: 5000
n_positions: 512
n_layer: 2
n_head: 4
n_embd: 128
dropout: 0.1
activation: gelu
lr: 0.0006
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
warmup_iters: 500
lr_decay_iters: 4000
min_lr: 6.0e-05
backend: nccl
device: mps
dtype: float32
no_compile: true
